<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - MarketPlace</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0f172a; color: #1e293b; }
    .login-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .login-box { background: white; padding: 2rem; border-radius: 1rem; width: 400px; }
    .login-box h2 { margin-bottom: 1.5rem; text-align: center; }
    .login-box input { width: 100%; padding: 0.8rem; margin: 0.5rem 0; border: 1px solid #cbd5e1; border-radius: 0.5rem; }
    .login-box button { width: 100%; padding: 0.8rem; background: #f97316; color: white; border: none; border-radius: 0.5rem; margin-top: 1rem; cursor: pointer; }
    .error { color: #dc2626; margin-top: 0.5rem; text-align: center; }
    .admin-container { display: flex; min-height: 100vh; }
    .sidebar { width: 280px; background: #1e293b; color: white; position: fixed; height: 100vh; }
    .sidebar-header { padding: 1.5rem; border-bottom: 1px solid #334155; }
    .sidebar-nav { padding: 1rem 0; }
    .nav-item { padding: 0.8rem 1.5rem; display: flex; align-items: center; gap: 0.8rem; cursor: pointer; color: #cbd5e1; }
    .nav-item:hover, .nav-item.active { background: #334155; color: white; }
    .main-content { flex: 1; margin-left: 280px; background: #f1f5f9; min-height: 100vh; }
    .top-bar { background: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; padding: 2rem; }
    .stat-card { background: white; padding: 1.5rem; border-radius: 1rem; }
    .stat-number { font-size: 2rem; font-weight: 700; color: #f97316; }
    .content-panel { padding: 2rem; display: none; }
    .content-panel.active { display: block; }
    table { width: 100%; background: white; border-radius: 1rem; overflow: auto; }
    th, td { padding: 1rem; text-align: left; border-bottom: 1px solid #e2e8f0; }
    .delete-btn { background: #dc2626; color: white; border: none; padding: 0.3rem 0.8rem; border-radius: 6px; cursor: pointer; }
    .approve-btn { background: #10b981; color: white; border: none; padding: 0.3rem 0.8rem; border-radius: 6px; cursor: pointer; margin: 0 0.2rem; }
    .logout-btn { background: #dc2626; color: white; border: none; padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; }
    @media (max-width: 768px) { .sidebar { width: 70px; } .sidebar-header h2 span, .nav-item span { display: none; } .main-content { margin-left: 70px; } }
  </style>
</head>
<body>
  <div id="app">
    <div id="loginScreen" class="login-container">
      <div class="login-box">
        <h2><i class="fas fa-shield-alt"></i> Admin Login</h2>
        <input type="email" id="adminEmail" placeholder="Email" value="admin@marketplace.com">
        <input type="password" id="adminPassword" placeholder="Password" value="admin123">
        <button onclick="adminLogin()">Login</button>
        <div id="loginError" class="error"></div>
      </div>
    </div>
  </div>
  <script>
    const API_URL = 'http://localhost:3000/api';
    let token = localStorage.getItem('adminToken');
    
    if (token) { loadDashboard(); }
    
    async function adminLogin() {
      const email = document.getElementById('adminEmail').value;
      const password = document.getElementById('adminPassword').value;
      try {
        const res = await fetch(`${API_URL}/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) });
        const data = await res.json();
        if (res.ok && data.user.isAdmin) {
          localStorage.setItem('adminToken', data.token);
          token = data.token;
          loadDashboard();
        } else { document.getElementById('loginError').innerText = 'Admin access required'; }
      } catch(e) { document.getElementById('loginError').innerText = 'Login failed'; }
    }
    
    async function loadDashboard() {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('app').innerHTML = \`
        <div class="admin-container">
          <div class="sidebar">
            <div class="sidebar-header"><h2><i class="fas fa-crown"></i> <span>Admin Panel</span></h2></div>
            <div class="sidebar-nav">
              <div class="nav-item active" onclick="showPanel('dashboard')"><i class="fas fa-chart-line"></i> <span>Dashboard</span></div>
              <div class="nav-item" onclick="showPanel('users')"><i class="fas fa-users"></i> <span>Users</span></div>
              <div class="nav-item" onclick="showPanel('products')"><i class="fas fa-boxes"></i> <span>All Ads</span></div>
              <div class="nav-item" onclick="showPanel('pending')"><i class="fas fa-clock"></i> <span>Pending</span></div>
            </div>
          </div>
          <div class="main-content">
            <div class="top-bar"><h1 id="panelTitle">Dashboard</h1><button class="logout-btn" onclick="logout()">Logout</button></div>
            <div id="panel-dashboard" class="content-panel active"><div class="stats-grid" id="statsGrid"></div></div>
            <div id="panel-users" class="content-panel"><div id="usersTable"></div></div>
            <div id="panel-products" class="content-panel"><div id="productsTable"></div></div>
            <div id="panel-pending" class="content-panel"><div id="pendingTable"></div></div>
          </div>
        </div>
      \`;
      loadStats(); loadUsers(); loadAllProducts(); loadPending();
    }
    
    async function fetchAdmin(endpoint, options = {}) {
      const res = await fetch(\`\${API_URL}\${endpoint}\`, { ...options, headers: { 'Authorization': \`Bearer \${token}\`, 'Content-Type': 'application/json' } });
      if (!res.ok) throw new Error('Request failed');
      return res.json();
    }
    
    async function loadStats() {
      try {
        const stats = await fetchAdmin('/admin/stats');
        document.getElementById('statsGrid').innerHTML = \`
          <div class="stat-card"><h3>Total Users</h3><div class="stat-number">\${stats.totalUsers || 0}</div></div>
          <div class="stat-card"><h3>Total Ads</h3><div class="stat-number">\${stats.totalAds || 0}</div></div>
          <div class="stat-card"><h3>Pending Ads</h3><div class="stat-number">\${stats.pendingAds || 0}</div></div>
          <div class="stat-card"><h3>Active Ads</h3><div class="stat-number">\${stats.activeAds || 0}</div></div>
        \`;
      } catch(e) { console.error(e); }
    }
    
    async function loadUsers() {
      try {
        const users = await fetchAdmin('/admin/users');
        document.getElementById('usersTable').innerHTML = \`
          <table><thead><tr><th>ID</th><th>Username</th><th>Email</th><th>Role</th><th>Actions</th></tr></thead><tbody>
          \${users.map(u => \`<tr><td>\${u.id}</td><td>\${u.username}</td><td>\${u.email}</td><td>\${u.is_admin ? 'Admin' : 'User'}</td><td>\${!u.is_admin ? '<button class="delete-btn" onclick="deleteUser(' + u.id + ')">Delete</button>' : ''}</td></tr>\`).join('')}
          </tbody></table>
        \`;
      } catch(e) { document.getElementById('usersTable').innerHTML = '<p>Error loading users</p>'; }
    }
    
    async function loadAllProducts() {
      try {
        const products = await fetchAdmin('/admin/all-products');
        document.getElementById('productsTable').innerHTML = \`
          <table><thead><tr><th>ID</th><th>Title</th><th>Price</th><th>Seller</th><th>Status</th><th>Actions</th></tr></thead><tbody>
          \${products.map(p => \`<tr><td>\${p.id}</td><td>\${p.title}</td><td>\$${p.price}</td><td>\${p.username}</td><td>\${p.status}</td><td><button class="delete-btn" onclick="deleteProduct(\${p.id})">Delete</button></td></tr>\`).join('')}
          </tbody></table>
        \`;
      } catch(e) { document.getElementById('productsTable').innerHTML = '<p>Error loading products</p>'; }
    }
    
    async function loadPending() {
      try {
        const products = await fetchAdmin('/admin/pending-products');
        document.getElementById('pendingTable').innerHTML = \`
          <table><thead><tr><th>ID</th><th>Title</th><th>Price</th><th>Seller</th><th>Actions</th></tr></thead><tbody>
          \${products.map(p => \`<tr><td>\${p.id}</td><td>\${p.title}</td><td>\$${p.price}</td><td>\${p.username}</td><td><button class="approve-btn" onclick="approveProduct(\${p.id})">Approve</button><button class="delete-btn" onclick="deleteProduct(\${p.id})">Reject</button></td></tr>\`).join('')}
          </tbody></table>
        \`;
      } catch(e) { document.getElementById('pendingTable').innerHTML = '<p>No pending ads</p>'; }
    }
    
    async function deleteUser(id) { if(confirm('Delete user?')) { await fetchAdmin(\`/admin/users/\${id}\`, { method: 'DELETE' }); loadUsers(); loadStats(); } }
    async function deleteProduct(id) { if(confirm('Delete ad?')) { await fetchAdmin(\`/admin/products/\${id}\`, { method: 'DELETE' }); loadAllProducts(); loadPending(); loadStats(); } }
    async function approveProduct(id) { await fetchAdmin(\`/admin/products/\${id}/approve\`, { method: 'PUT' }); loadAllProducts(); loadPending(); loadStats(); }
    
    function showPanel(panel) {
      document.querySelectorAll('.content-panel').forEach(p => p.classList.remove('active'));
      document.getElementById(\`panel-\${panel}\`).classList.add('active');
      document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
      event.target.closest('.nav-item').classList.add('active');
      const titles = { dashboard: 'Dashboard', users: 'User Management', products: 'All Ads', pending: 'Pending Approval' };
      document.getElementById('panelTitle').innerText = titles[panel];
    }
    
    function logout() { localStorage.removeItem('adminToken'); location.reload(); }
  </script>
</body>
</html>
